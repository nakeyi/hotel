<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户诉求</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/ui.css" rel="stylesheet">
</head>
<body>
<div class="app-wrap module-shell">
  <div class="app-toolbar embed-hide module-toolbar">
    <div>
      <div class="app-title">用户诉求</div>
    </div>
    <button class="btn btn-outline-secondary btn-sm ms-auto" onclick="location.href='/dashboard'">返回工作台</button>
  </div>

  <div class="module-grid">
    <section class="module-main">
      <div class="module-stack">
        <div class="app-card">
          <div class="card-body">
            <div class="module-card-title">
              <div>
                <div class="section-title mb-1">诉求筛选</div>
              </div>
              <button class="btn btn-outline-primary btn-sm" onclick="loadAll()">刷新诉求</button>
            </div>
            <div class="module-chip-row">
              <select id="filterStatus" class="form-select form-select-sm" style="max-width:160px" onchange="render()">
                <option value="">全部状态</option>
                <option value="待处理">待处理</option>
                <option value="已处理">已处理</option>
                <option value="已拒绝">已拒绝</option>
              </select>
              <select id="filterType" class="form-select form-select-sm" style="max-width:180px" onchange="render()">
                <option value="">全部类型</option>
                <option value="换房申请">换房申请</option>
                <option value="评价">评价</option>
                <option value="投诉">投诉</option>
                <option value="清洁申请">清洁申请</option>
              </select>
            </div>
          </div>
        </div>

        <div class="app-card">
          <div class="card-body">
            <div class="module-card-title">
              <div>
                <div class="section-title mb-1">处理诉求</div>
              </div>
            </div>
            <div class="module-field-grid">
              <input id="rid" class="form-control" placeholder="诉求ID">
              <input id="resp" class="form-control" placeholder="处理说明">
            </div>
            <div class="module-action-row mt-2">
              <button class="btn btn-success" onclick="handleReq('approve')">同意</button>
              <button class="btn btn-danger" onclick="handleReq('reject')">拒绝</button>
            </div>
            <div id="msg" class="msg-line mt-2"></div>
          </div>
        </div>

        <div class="app-card">
          <div class="card-body">
            <div class="module-card-title">
              <div>
                <div class="section-title mb-1">诉求列表</div>
              </div>
            </div>
            <div class="module-table-wrap">
              <table class="table table-hover align-middle">
                <thead><tr><th>ID</th><th>类型</th><th>客户</th><th>手机号</th><th>原房间</th><th>目标房间</th><th>评分</th><th>内容</th><th>状态</th><th>处理人</th><th>回复</th></tr></thead>
                <tbody id="tb"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>

    <aside class="module-side">
      <div class="app-card mb-3">
        <div class="card-body">
          <div class="section-title">处理提示</div>
        </div>
      </div>
      <div class="app-card">
        <div class="card-body">
        </div>
      </div>
    </aside>
  </div>
</div>

<script>
let allRows = [];

function render() {
  const fs = filterStatus.value;
  const ft = filterType.value;
  const rows = (allRows || []).filter(x => (!fs || x.status === fs) && (!ft || x.request_type === ft));
  tb.innerHTML = rows.map(x => `<tr>
    <td>${x.request_id}</td>
    <td>${x.request_type}</td>
    <td>${x.customer_name}</td>
    <td>${x.customer_phone || ""}</td>
    <td>${x.room_id || ""}</td>
    <td>${x.target_room_id || ""}</td>
    <td>${x.score || ""}</td>
    <td>${x.content || ""}</td>
    <td>${x.status}</td>
    <td>${x.handler || ""}</td>
    <td>${x.response || ""}</td>
  </tr>`).join("");
}

async function loadAll() {
  const r = await fetch("/api/requests", { credentials: "include" });
  const d = await r.json();
  if (r.status === 401 || r.status === 403) {
    location.href = "/";
    return;
  }
  allRows = d || [];
  render();
}

async function handleReq(action) {
  const r = await fetch("/api/requests/handle", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ request_id: rid.value, response: resp.value, action })
  });
  const d = await r.json();
  msg.textContent = `${d.success ? "成功" : "失败"}：${d.message || ""}`;
  loadAll();
}

if (new URLSearchParams(location.search).get("embed") === "1") {
  document.querySelectorAll(".embed-hide").forEach(el => el.classList.add("d-none"));
}

loadAll();
</script>
</body>
</html>
