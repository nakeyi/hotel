<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统计分析</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/ui.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-wrap module-shell">
  <div class="app-toolbar embed-hide module-toolbar">
    <div>
      <div class="app-title">统计分析</div>
    </div>
    <div class="d-flex gap-2 ms-auto">
      <button class="btn btn-outline-primary btn-sm" onclick="renderCharts()">刷新统计图</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/dashboard'">返回工作台</button>
    </div>
  </div>

  <div class="module-grid module-grid-wide">
    <section class="module-main">
      <div class="module-stack">
        <div class="app-card">
          <div class="card-body">
            <div class="module-card-title">
              <div>
                <div class="section-title mb-1">收入与入住率折线图</div>
              </div>
            </div>
            <canvas id="lineChart" height="90"></canvas>
          </div>
        </div>
        <div class="app-card">
          <div class="card-body">
            <div class="module-card-title">
              <div>
                <div class="section-title mb-1">月收入柱状图</div>
              </div>
            </div>
            <canvas id="barChart" height="90"></canvas>
          </div>
        </div>
      </div>
    </section>

    <aside class="module-side">
      <div class="module-panel-stack">
        <div class="app-card mb-3">
          <div class="card-body">
          </div>
        </div>
        <div class="app-card">
          <div class="card-body">
          </div>
        </div>
      </div>
    </aside>
  </div>
</div>

<script>
let lineChart, barChart;

function monthStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

function lastMonths(n) {
  const arr = [];
  const now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const t = new Date(now.getFullYear(), now.getMonth() - i, 1);
    arr.push(monthStr(t));
  }
  return arr;
}

async function renderCharts() {
  const months = lastMonths(6);
  const r = await fetch("/api/statistics/series", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ months })
  });
  const d = await r.json();
  if (r.status === 401 || r.status === 403) {
    location.href = "/";
    return;
  }

  const labels = d.map(x => x.month);
  const income = d.map(x => Number(x.income || 0));
  const occ = d.map(x => Number(x.occupancy_rate || 0));

  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "收入", data: income, borderColor: "#2563eb", backgroundColor: "rgba(37,99,235,.2)", yAxisID: "y" },
        { label: "入住率(%)", data: occ, borderColor: "#16a34a", backgroundColor: "rgba(22,163,74,.2)", yAxisID: "y1" }
      ]
    },
    options: { responsive: true, scales: { y: { position: "left" }, y1: { position: "right", grid: { drawOnChartArea: false } } } }
  });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: { labels, datasets: [{ label: "收入", data: income, backgroundColor: "#0ea5e9" }] },
    options: { responsive: true }
  });
}

if (new URLSearchParams(location.search).get("embed") === "1") {
  document.querySelectorAll(".embed-hide").forEach(el => el.classList.add("d-none"));
}

renderCharts();
</script>
</body>
</html>
