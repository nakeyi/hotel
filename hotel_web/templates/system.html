<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系统管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/ui.css" rel="stylesheet">
</head>
<body>
<div class="app-wrap module-shell">
  <div class="app-toolbar embed-hide module-toolbar">
    <div>
      <div class="app-title">系统管理</div>
    </div>
    <div class="d-flex gap-2 ms-auto">
      <button class="btn btn-success btn-sm" onclick="location.href='/api/backup/sql'">数据库备份 SQL</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/dashboard'">返回工作台</button>
    </div>
  </div>

  <div class="app-card mb-3">
    <div class="card-body">
      <div class="front-tab-row" id="systemTabs"></div>
    </div>
  </div>

  <section id="systemPanelUsers" class="system-panel">
    <div class="app-card">
      <div class="card-body">
        <div class="module-card-title">
          <div>
            <div class="section-title mb-1">员工管理</div>
          </div>
          <div class="module-chip-row">
            <button class="module-chip" onclick="loadUsers()">刷新员工</button>
          </div>
        </div>
        <div class="module-panel-stack">
          <div class="module-field-grid">
            <input id="u" class="form-control" placeholder="用户名">
            <input id="p" class="form-control" placeholder="密码">
            <select id="r" class="form-select"></select>
            <div></div>
          </div>
          <div class="module-action-row">
            <button class="btn btn-primary" onclick="addUser()">新增员工</button>
          </div>
          <div class="module-field-grid">
            <input id="edit_id" class="form-control" placeholder="员工ID">
            <input id="edit_u" class="form-control" placeholder="新用户名">
            <select id="edit_r" class="form-select"></select>
            <div class="module-action-row">
              <button class="btn btn-warning" onclick="updateUser()">修改员工</button>
            </div>
          </div>
        </div>
        <div id="msg" class="msg-line mt-2"></div>
        <div class="module-table-wrap mt-3">
          <table class="table table-hover align-middle">
            <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody id="tb"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <section id="systemPanelRooms" class="system-panel d-none">
    <div class="app-card">
      <div class="card-body">
        <div class="module-card-title">
          <div>
            <div class="section-title mb-1">客房管理</div>
          </div>
        </div>
        <div class="module-panel-stack">
          <div class="border rounded-3 p-3 bg-light">
            <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
              <div>
                <div class="fw-bold">房间改价</div>
              </div>
              <button class="btn btn-outline-primary" onclick="price()">修改房价</button>
            </div>
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md-5">
                <select id="pr" class="form-select">
                  <option value="">请选择房间号</option>
                </select>
              </div>
              <div class="col-12 col-md-5">
                <input id="pp" class="form-control" placeholder="新价格">
              </div>
            </div>
          </div>
          <div class="border rounded-3 p-3 bg-light">
            <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
              <div>
                <div class="fw-bold">新增房间</div>
              </div>
              <button class="btn btn-outline-primary" onclick="addRoom()">新增房间</button>
            </div>
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md-3">
                <input id="nr" class="form-control" placeholder="房间号">
              </div>
              <div class="col-12 col-md-3">
                <select id="nt" class="form-select">
                  <option value="">请选择房型</option>
                </select>
              </div>
              <div class="col-12 col-md-3">
                <input id="na" class="form-control" placeholder="面积">
              </div>
              <div class="col-12 col-md-3">
                <input id="np" class="form-control" placeholder="价格">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="systemPanelTypes" class="system-panel d-none">
    <div class="app-card">
      <div class="card-body">
        <div class="module-card-title">
          <div>
            <div class="section-title mb-1">房型管理</div>
          </div>
          <button class="btn btn-outline-primary btn-sm" onclick="loadTypes()">刷新房型</button>
        </div>
        <div class="border rounded-3 p-3 bg-light">
          <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
            <div>
              <div class="fw-bold">新增房型</div>
            </div>
            <button class="btn btn-primary" onclick="addType()">新增房型</button>
          </div>
          <div class="row g-2 align-items-end">
            <div class="col-12 col-md-5">
              <input id="tn" class="form-control" placeholder="房型名称">
            </div>
            <div class="col-12 col-md-5">
              <input id="tp" class="form-control" placeholder="基础价格">
            </div>
          </div>
        </div>
        <div class="module-table-wrap mt-3">
          <table class="table table-hover align-middle">
            <thead><tr><th>房型名称</th><th>基础价格</th></tr></thead>
            <tbody id="types"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <section id="systemPanelCustomers" class="system-panel d-none">
    <div class="app-card">
      <div class="card-body">
        <div class="module-card-title">
          <div>
            <div class="section-title mb-1">客户信息</div>
          </div>
          <button class="btn btn-outline-primary btn-sm" onclick="loadCustomers()">刷新客户</button>
        </div>
        <div class="module-table-wrap">
          <table class="table table-hover align-middle">
            <thead><tr><th>ID</th><th>姓名</th><th>手机号</th></tr></thead>
            <tbody id="ctb"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <section id="systemPanelLogs" class="system-panel d-none">
    <div class="app-card">
      <div class="card-body">
        <div class="module-card-title">
          <div>
            <div class="section-title mb-1">操作日志</div>
          </div>
          <button class="btn btn-outline-primary btn-sm" onclick="loadLogs()">刷新日志</button>
        </div>
        <div class="module-table-wrap">
          <table class="table table-hover align-middle">
            <thead><tr><th>时间</th><th>操作人</th><th>类型</th><th>详情</th></tr></thead>
            <tbody id="logs"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
const $ = id => document.getElementById(id);
let roomCache = [];
let roomTypeCache = [];
const systemTabs = [
  ["users", "员工管理"],
  ["rooms", "客房管理"],
  ["types", "房型管理"],
  ["customers", "客户信息"],
  ["logs", "操作日志"]
];
const roleOptions = [
  ["manager", "经理"],
  ["receptionist", "店长"],
  ["frontdesk", "前台"]
];
const roleMap = Object.fromEntries(roleOptions);

async function req(url, opt = {}) {
  const r = await fetch(url, { credentials: "include", ...opt });
  const d = await r.json();
  if (r.status === 401 || r.status === 403) location.href = "/";
  return d;
}

function fillRoleOptions() {
  const html = roleOptions.map(([value, label]) => `<option value="${value}">${label}</option>`).join("");
  r.innerHTML = html;
  edit_r.innerHTML = html;
}

async function addUser() {
  const d = await req("/api/users", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: u.value, password: p.value, role: r.value })
  });
  msg.textContent = d.message || "";
  loadUsers();
}

function fillRoomSelects() {
  const roomOptions = ['<option value="">请选择房间号</option>']
    .concat(roomCache.map(x => `<option value="${x.room_id}">${x.room_id} · ${x.room_type || ""} · ${x.status || ""}</option>`))
    .join("");
  const typeOptions = ['<option value="">请选择房型</option>']
    .concat(roomTypeCache.map(x => `<option value="${x.name}">${x.name}</option>`))
    .join("");
  if ($("pr")) $("pr").innerHTML = roomOptions;
  if ($("nt")) $("nt").innerHTML = typeOptions;
}

async function updateUser() {
  const id = edit_id.value;
  if (!id) {
    msg.textContent = "请先输入员工ID";
    return;
  }
  const d = await req("/api/users/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: edit_u.value, role: edit_r.value })
  });
  msg.textContent = d.message || "";
  loadUsers();
}

function fillEdit(id, username, role) {
  edit_id.value = id;
  edit_u.value = username;
  edit_r.value = role;
}

async function delUser(id) {
  const d = await req("/api/users/" + id, { method: "DELETE" });
  msg.textContent = d.message || "";
  loadUsers();
}

async function loadUsers() {
  const d = await req("/api/users");
  tb.innerHTML = (d || []).map(x => `
    <tr>
      <td>${x.user_id}</td>
      <td>${x.username}</td>
      <td>${roleMap[x.role] || x.role || ""}</td>
      <td>${x.created_at || ""}</td>
      <td>
        <button class="btn btn-sm btn-warning me-1" onclick="fillEdit(${x.user_id}, '${(x.username || "").replace(/'/g, "\\'")}', '${x.role}')">改</button>
        <button class="btn btn-sm btn-danger" onclick="delUser(${x.user_id})">删</button>
      </td>
    </tr>
  `).join("");
}

async function loadCustomers() {
  const d = await req("/api/customers");
  ctb.innerHTML = (d || []).map(x => `<tr><td>${x.cust_id}</td><td>${x.name}</td><td>${x.phone}</td></tr>`).join("");
}

async function price() {
  if (!pr.value) {
    msg.textContent = "请先选择房间号";
    return;
  }
  const d = await req("/api/rooms/price", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room_id: pr.value, price: pp.value })
  });
  msg.textContent = d.message || "";
  loadRooms();
}

async function addRoom() {
  if (!nt.value) {
    msg.textContent = "请先选择房型";
    return;
  }
  const d = await req("/api/rooms/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room_id: nr.value, room_type: nt.value, area: na.value, price: np.value })
  });
  msg.textContent = d.message || "";
  loadRooms();
}

async function addType() {
  const d = await req("/api/room_types", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: tn.value, price: tp.value })
  });
  msg.textContent = d.message || "";
  loadTypes();
}

async function loadTypes() {
  const d = await req("/api/room_types");
  roomTypeCache = Array.isArray(d) ? d.map(x => ({ name: x.name, price: x.price })) : [];
  if ($("types")) {
    types.innerHTML = roomTypeCache.map(x => `<tr><td>${x.name || ""}</td><td>${Number(x.price || 0).toFixed(2)}</td></tr>`).join("");
  }
  fillRoomSelects();
}

async function loadLogs() {
  const d = await req("/api/logs");
  if ($("logs")) {
    logs.innerHTML = (d || []).map(x => `<tr><td>${x.log_time || ""}</td><td>${x.operator || ""}</td><td>${x.operation_type || ""}</td><td>${x.detail || ""}</td></tr>`).join("");
  }
}

async function loadRooms() {
  const d = await req("/api/rooms");
  roomCache = Array.isArray(d) ? d.map(x => ({
    room_id: x.room_id,
    room_type: x.room_type,
    area: x.area,
    price: x.price,
    status: x.status
  })) : [];
  fillRoomSelects();
}

function switchPanel(panelKey) {
  const mapping = {
    users: systemPanelUsers,
    rooms: systemPanelRooms,
    types: systemPanelTypes,
    customers: systemPanelCustomers,
    logs: systemPanelLogs
  };
  document.querySelectorAll(".system-panel").forEach(panel => panel.classList.add("d-none"));
  const target = mapping[panelKey];
  if (target) target.classList.remove("d-none");
  document.querySelectorAll("#systemTabs .front-tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.panel === panelKey));
}

function buildSystemTabs() {
  $("systemTabs").innerHTML = systemTabs.map(([key, label], index) =>
    `<button class="front-tab-btn${index === 0 ? " active" : ""}" data-panel="${key}">${label}</button>`
  ).join("");
  document.querySelectorAll("#systemTabs .front-tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchPanel(btn.dataset.panel));
  });
}

fillRoleOptions();
loadUsers();
loadCustomers();
loadTypes();
loadLogs();
loadRooms();
buildSystemTabs();

if (new URLSearchParams(location.search).get("embed") === "1") {
  document.querySelector(".app-toolbar")?.classList.add("d-none");
}
</script>
</body>
</html>
