<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>经理/店长工作台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/ui.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark app-nav dashboard-nav">
  <div class="container-fluid px-3">
    <div class="d-flex align-items-center gap-2">
      <span class="navbar-brand app-title mb-0">酒店管理系统</span>
      <span id="rolePill" class="role-pill">{{ role }}</span>
    </div>
    <div class="text-white d-flex align-items-center gap-2">
      <span>{{ username }}</span>
      <button class="btn btn-sm btn-outline-light" onclick="logout()">退出登录</button>
    </div>
  </div>
</nav>

<div class="app-wrap dashboard-shell">
  <div class="dashboard-grid">
    <aside id="menuCard" class="app-card role-shell side-menu-shell">
      <div class="card-body">
        <div class="section-title">功能导航</div>
        <div class="menu-group">
          <div class="menu-group-title">前台业务</div>
          <div id="frontMenu" class="d-grid gap-2"></div>
        </div>
        <div class="menu-group mt-3">
          <div class="menu-group-title">管理模块</div>
          <div id="adminMenu" class="d-grid gap-2"></div>
        </div>
      </div>
    </aside>

    <section id="contentCard" class="app-card content-panel role-shell">
      <div id="welcome" class="hero hero-dashboard p-4 m-3">
        <div class="welcome-grid">
          <div>
          <div class="hero-kicker">工作台总览</div>
          <h4 class="mb-1">欢迎进入经理/店长工作台</h4>
        </div>
        <div class="welcome-meta">
            <div class="meta-item"><span>角色</span><strong id="roleText">{{ role }}</strong></div>
            <div class="meta-item"><span>当前用户</span><strong>{{ username }}</strong></div>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat">
            <span>前台业务</span>
            <strong>入住 / 预定 / 退房 / 换房 / 查询</strong>
          </div>
          <div class="hero-stat">
            <span>管理模块</span>
            <strong>房间维护 / 报表 / 分析 / 诉求 / 系统</strong>
          </div>
        </div>
      </div>
      <iframe id="contentFrame" class="content-frame d-none" title="content"></iframe>
    </section>
  </div>
</div>

<script>
const role = "{{ role }}";
const roleLabelMap = {
  manager: "经理",
  receptionist: "店长",
  frontdesk: "前台",
  maintenance: "维修工",
  cleaner: "清洁工"
};
const roleClassMap = {
  manager: "role-manager",
  receptionist: "role-receptionist",
  maintenance: "role-maintenance",
  cleaner: "role-cleaner"
};

const menus = {
  manager: {
    front: [
      ["入住", "/front_office?tab=checkin"],
      ["预定", "/front_office?tab=reserve"],
      ["退房", "/front_office?tab=checkout"],
      ["换房", "/front_office?tab=change_room"],
      ["查询状态", "/front_office?tab=status"]
    ],
    admin: [
      ["房间维护", "/room_maint"],
      ["查询报表", "/query_report"],
      ["统计分析", "/statistics"],
      ["用户诉求", "/complaint"],
      ["系统管理", "/system"]
    ]
  },
  receptionist: {
    front: [
      ["入住", "/front_office?tab=checkin"],
      ["预定", "/front_office?tab=reserve"],
      ["退房", "/front_office?tab=checkout"],
      ["换房", "/front_office?tab=change_room"],
      ["查询状态", "/front_office?tab=status"]
    ],
    admin: [
      ["房间维护", "/room_maint"],
      ["查询报表", "/query_report"],
      ["统计分析", "/statistics"],
      ["用户诉求", "/complaint"]
    ]
  },
  frontdesk: {
    front: [
      ["入住", "/front_office?tab=checkin"],
      ["退房", "/front_office?tab=checkout"],
      ["换房", "/front_office?tab=change_room"],
      ["查询状态", "/front_office?tab=status"]
    ],
    admin: [
      ["房间维护", "/room_maint"],
      ["用户诉求", "/complaint"]
    ]
  },
  maintenance: {
    front: [],
    admin: [
      ["房间维护", "/room_maint"],
      ["查询报表", "/query_report"],
      ["统计分析", "/statistics"],
      ["用户诉求", "/complaint"]
    ]
  },
  cleaner: {
    front: [],
    admin: [
      ["房间维护", "/room_maint"],
      ["查询报表", "/query_report"],
      ["统计分析", "/statistics"],
      ["用户诉求", "/complaint"]
    ]
  }
};

document.getElementById("menuCard").classList.add(roleClassMap[role] || "role-manager");
document.getElementById("contentCard").classList.add(roleClassMap[role] || "role-manager");
document.getElementById("rolePill").textContent = roleLabelMap[role] || role;
document.getElementById("roleText").textContent = roleLabelMap[role] || role;

const menuGroup = menus[role] || { front: [], admin: [] };
const frontMenuEl = document.getElementById("frontMenu");
const adminMenuEl = document.getElementById("adminMenu");

frontMenuEl.innerHTML = (menuGroup.front || []).map((m, i) =>
  `<button class="menu-btn${i === 0 ? " active" : ""}" data-url="${m[1]}">${m[0]}</button>`
).join("") || '<div class="menu-empty">暂无前台业务权限</div>';

adminMenuEl.innerHTML = (menuGroup.admin || []).map((m, i) =>
  `<button class="menu-btn${menuGroup.front.length === 0 && i === 0 ? " active" : ""}" data-url="${m[1]}">${m[0]}</button>`
).join("") || '<div class="menu-empty">暂无管理模块权限</div>';

const frame = document.getElementById("contentFrame");
const welcome = document.getElementById("welcome");
let currentFrameUrl = "";

function activate(btn) {
  document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function loadInRight(url) {
  const nextUrl = `${url}${url.includes("?") ? "&" : "?"}embed=1`;
  if (currentFrameUrl === nextUrl) {
    return;
  }
  currentFrameUrl = nextUrl;
  welcome.classList.add("d-none");
  frame.classList.remove("d-none");
  frame.src = nextUrl;
}

document.querySelectorAll(".menu-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activate(btn);
    loadInRight(btn.dataset.url);
  });
});

async function logout() {
  await fetch("/api/logout", { method: "POST", credentials: "include" });
  location.href = "/";
}
</script>
</body>
</html>
